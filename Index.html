<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        body { text-align: center; font-family: Arial, sans-serif; background-color: #f0f0f0; padding-top: 50px; }
        button { padding: 15px 30px; font-size: 20px; background-color: #4CAF50; color: white; border: none; cursor: pointer; border-radius: 5px; }
        button:active { background-color: #45a049; }
        h1 { color: #333; }
    </style>
</head>
<body>

    <h1>🎮</h1>
    <p></p>
    <h2 id="score">: 0</h2>
    <button onclick="increaseScore()"></button>

    <script>
        let count = 0;
        function increaseScore() {
            count++;
            document.getElementById("score").innerText =  " + count;
        }
    </script>
</body>
</html>
